<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/v_black.png" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default meta tags (will be overridden by react-helmet-async) -->
    <title>Vidacure - Sustainable Weight Loss Backed by Medical Science</title>
    <meta name="description" content="Vidacure combines approved medication with personal coaching to help you achieve sustainable weight loss. Effective, science-backed treatment with medical support." />

    <!-- Theme color -->
    <meta name="theme-color" content="#0D9488" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <script>
      // Set initial favicon and listen for theme changes
      function updateFavicon() {
        const favicon = document.getElementById('favicon');
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        favicon.href = isDark ? '/v_white.png' : '/v_black.png';
      }

      // Update on initial load
      updateFavicon();

      // Listen for theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
